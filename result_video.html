<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Detection Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #667eea; color: white; text-align: center; padding: 50px; }
        .video-container { background: white; padding: 20px; border-radius: 15px; display: inline-block; }
        video { max-width: 100%; border-radius: 10px; }
        .btn-back { background: #764ba2; color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="video-container shadow-lg">
        <h2 class="text-dark mb-4">📹 Video Detection Result</h2>
        
        <video controls>
            <source src="{{ url_for('static', filename='uploads/' + video_url) }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <br>
        <a href="/" class="btn-back">⬅ Back to Home</a>
    </div>

</body>
</html>
