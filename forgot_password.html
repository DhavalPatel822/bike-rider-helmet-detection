<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 20px; display: inline-block; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input { display: block; width: 250px; margin: 10px auto; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Forgot Password</h2>
        <input type="email" id="email" placeholder="Enter Registered Email">
        <button onclick="sendOTP()">Send OTP</button>

        <div id="reset-section" style="display:none; margin-top:20px; border-top:1px solid #ccc; padding-top:20px;">
            <input type="text" id="otp" placeholder="Enter 6-digit OTP">
            <input type="password" id="new_pass" placeholder="Enter New Password">
            <button onclick="resetPassword()">Update Password</button>
        </div>
    </div>
<div class="login-card">
    <i class="fa-solid fa-lock bike-icon"></i>
    <h2>Reset Password</h2>
    
    <input type="email" id="email" placeholder="Enter Registered Email" required>
    
    <input type="text" id="otp_input" placeholder="Enter 6-digit OTP" required>
    
    <input type="password" id="new_password_input" placeholder="Enter New Password" required>
    
    <p id="error-msg" style="color: #ff4d4d; font-size: 14px; margin-top: 10px; display: none;"></p>

    <button onclick="resetPassword()">Update Password</button>
    
    <br><br>
    <a href="/login">Back to Login</a>
</div>
    <script>
        function sendOTP() {
            const email = document.getElementById('email').value;
            fetch('/api/send-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email})
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.success) document.getElementById('reset-section').style.display = 'block';
            });
        }

        function resetPassword() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            const new_pass = document.getElementById('new_pass').value;

            fetch('/api/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, otp: otp, new_password: new_pass})
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.success) window.location.href = "/"; // Redirect to login
            });
        }
    </script>
</body>
</html>
